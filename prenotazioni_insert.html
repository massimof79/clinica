<!-- prenotazioni_insert.html -->
<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>Nuova prenotazione</title>
</head>
<body>
<h3>Inserisci prenotazione</h3>

<form id="f">
  <input name="paziente_id" type="number" placeholder="ID paziente" required>
  <input name="medico_id" type="number" placeholder="ID medico" required>
  <input name="data_ora" type="datetime-local" required>
  <select name="stato">
    <option value="prenotata">prenotata</option>
    <option value="confermata">confermata</option>
    <option value="annullata">annullata</option>
    <option value="completata">completata</option>
  </select>
  <input name="note" maxlength="255" placeholder="Note (opzionale)">
  <button>Salva</button>
</form>

<p id="msg"></p>

<script>
var f=document.getElementById("f"), msg=document.getElementById("msg");

f.onsubmit=function(e){
  e.preventDefault();
  fetch("api_prenotazioni_insert.php",{method:"POST",body:new FormData(f)})
    .then(r=>r.text())
    .then(t=>msg.textContent=t)
    .catch(()=>msg.textContent="Errore");
};
</script>
</body>
</html>
