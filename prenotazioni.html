<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>Elenco prenotazioni</title>
<style>
table { border-collapse: collapse; width:100% }
th,td { border:1px solid #bbb; padding:6px }
.muted { color:#555; font-size:.9em }
.error { color:#b00020 }
</style>
</head>
<body>

<h2>Elenco prenotazioni</h2>
<p id="status">Caricamento...</p>

<table>
<thead>
<tr>
<th>ID</th><th>Data/Ora</th><th>Stato</th>
<th>Paziente</th><th>Medico</th>
<th>Ambulatorio</th><th>Note</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

<script>
function esc(s){
  return String(s||"").replace(/[&<>"']/g,c=>(
    {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]
  ));
}

fetch("api_prenotazioni_list.php")
.then(r=>r.json().then(d=>{
  if(!r.ok || !d.ok) throw Error(d.error||"Errore");
  document.getElementById("status").textContent="Record: "+d.count;
  document.getElementById("body").innerHTML = d.data.map(x=>`
    <tr>
      <td>${esc(x.prenotazione_id)}</td>
      <td>${esc(x.data_ora)}</td>
      <td>${esc(x.stato)}</td>
      <td><b>${esc(x.paziente_cognome)} ${esc(x.paziente_nome)}</b><div class="muted">${esc(x.paziente_email)}</div></td>
      <td><b>${esc(x.medico_cognome)} ${esc(x.medico_nome)}</b><div class="muted">${esc(x.specializzazione)}</div></td>
      <td><b>${esc(x.ambulatorio_nome)}</b><div class="muted">${esc(x.ambulatorio_citta)}</div></td>
      <td>${esc(x.note)}</td>
    </tr>
  `).join("");
}))
.catch(e=>{
  document.getElementById("status").innerHTML="<span class='error'>Errore</span>";
});
</script>

</body>
</html>
