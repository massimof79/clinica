<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>Elenco prenotazioni</title>
<style>
table { border-collapse: collapse; width:100% }
th,td { border:1px solid #bbb; padding:6px }
.muted { color:#555; font-size:.9em }
.error { color:#b00020 }
</style>
</head>
<body>

<h2>Elenco prenotazioni</h2>
<p id="status">Caricamento...</p>

<table>
<thead>
<tr>
<th>ID</th><th>Data/Ora</th><th>Stato</th>
<th>Paziente</th><th>Medico</th>
<th>Ambulatorio</th><th>Note</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

<script>
fetch("api_prenotazioni_list.php")
.then(r=>r.json().then(d=>{
  if(!r.ok || !d.ok) throw Error(d.error||"Errore");

  document.getElementById("status").textContent = "Record: " + d.count;

  var html = "";
  for (var i = 0; i < d.data.length; i++) {
    var x = d.data[i];
    html += "<tr>" +
      "<td>" + x.prenotazione_id + "</td>" +
      "<td>" + x.data_ora + "</td>" +
      "<td>" + x.stato + "</td>" +
      "<td><b>" + x.paziente_cognome + " " + x.paziente_nome + "</b>" +
      "<div class='muted'>" + x.paziente_email + "</div></td>" +
      "<td><b>" + x.medico_cognome + " " + x.medico_nome + "</b>" +
      "<div class='muted'>" + x.specializzazione + "</div></td>" +
      "<td><b>" + x.ambulatorio_nome + "</b>" +
      "<div class='muted'>" + x.ambulatorio_citta + "</div></td>" +
      "<td>" + (x.note ? x.note : "") + "</td>" +
    "</tr>";
  }

  document.getElementById("body").innerHTML = html;
}))
.catch(()=>{
  document.getElementById("status").innerHTML="<span class='error'>Errore</span>";
});
</script>

</body>
</html>
