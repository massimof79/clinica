<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Nuova Prenotazione</title>
    <style>
        body { font-family: Arial; background:#f5f5f5; padding:40px; }
        h1 { text-align:center; margin-bottom:20px; }
        form { width:400px; margin:0 auto; background:white; padding:20px; border-radius:8px; }
        input, select {
            width:100%; padding:10px; margin:10px 0;
            border:1px solid #ccc; border-radius:6px;
        }
        button {
            width:100%; padding:12px; background:#27ae60;
            color:white; border:none; border-radius:6px; font-size:16px;
        }
        button:hover { background:#1e8449; }
        #msg { margin-top:20px; text-align:center; font-size:18px; }
    </style>
</head>
<body>

<h1>Inserisci una nuova prenotazione</h1>

<form id="formPren">
    <h3>Dati paziente</h3>
    <input type="text" id="p_nome" placeholder="Nome paziente" required>
    <input type="text" id="p_cognome" placeholder="Cognome paziente" required>
    <input type="email" id="p_email" placeholder="Email paziente" required>
    <input type="text" id="p_cf" placeholder="Codice fiscale" required>

    <h3>Dati medico</h3>
    <input type="text" id="m_nome" placeholder="Nome medico" required>
    <input type="text" id="m_cognome" placeholder="Cognome medico" required>
    <input type="text" id="m_spec" placeholder="Specializzazione" required>
    <input type="email" id="m_email" placeholder="Mail" required>
    <input type="number" id="m_amb" placeholder="ID ambulatorio" required>

    <h3>Prenotazione</h3>
    <input type="date" id="data" required>
    <input type="time" id="ora" required>
    <input type="text" id="note" placeholder="Note">

    <button type="submit">Salva prenotazione</button>
</form>

<div id="msg"></div>

<script>
document.getElementById("formPren").addEventListener("submit", e => {
    e.preventDefault();

    const dati = {
        p_nome: document.getElementById("p_nome").value,
        p_cognome: document.getElementById("p_cognome").value,
        p_email: document.getElementById("p_email").value,
        p_cf: document.getElementById("p_cf").value,

        m_nome: document.getElementById("m_nome").value,
        m_cognome: document.getElementById("m_cognome").value,
        m_spec: document.getElementById("m_spec").value,
        m_amb: document.getElementById("m_amb").value,

        data: document.getElementById("data").value,
        ora: document.getElementById("ora").value,
        note: document.getElementById("note").value
    };

    fetch("api_nuova_prenotazione.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(dati)
    })
    .then(r => r.json())
    .then(res => {
        document.getElementById("msg").innerHTML =
            res.success ? "<span style='color:green;'>Prenotazione salvata!</span>"
                        : "<span style='color:red;'>Errore: " + res.error + "</span>";

        let menuBtn = document.createElement("button");
        menuBtn.textContent = "Torna al menù principale";
        menuBtn.style.marginTop = "15px";
        menuBtn.style.padding = "10px 18px";
        menuBtn.style.background = "#34495e";
        menuBtn.style.color = "white";
        menuBtn.style.border = "none";
        menuBtn.style.borderRadius = "6px";
        menuBtn.style.cursor = "pointer";
        menuBtn.style.fontSize = "16px";
        menuBtn.style.display = "block";

        menuBtn.addEventListener("click", () => {
            window.location.href = "index.html";
        });

        document.getElementById('msg').appendChild(menuBtn);

    });
    
});
</script>

</body>
</html>
